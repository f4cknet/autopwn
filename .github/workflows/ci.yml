name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq ropper

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest pytest-cov

      - name: Unit tests (skip integration)
        run: |
          pytest -m "not integration" --cov=autopwn --cov-report=term --cov-report=xml -q

      - name: Integration tests
        run: |
          pytest -m integration -q
        continue-on-error: false

  lint:
    name: Lint (syntax + import smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check all .py files
        run: |
          python -m compileall -q autopwn/ tests/ scripts/ tools/

      - name: Import smoke test
        run: |
          python -c "import autopwn; import autopwn.cli; import autopwn.orchestrator; print('imports OK')"

      - name: CLI smoke test
        run: |
          python -m autopwn --help
